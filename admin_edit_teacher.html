<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Teacher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Edit Teacher</h1>
            <a href="{{ url_for('admin_teachers') }}" class="btn btn-secondary">Back</a>
        </header>
        <main>
            {% if teacher %}
            <form method="POST" class="form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="{{ teacher.name }}" required>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" value="{{ teacher.department }}" required>
                </div>
                <div class="form-group">
                    <label for="subjects">Subjects</label>
                    <input type="text" id="subjects" name="subjects" value="{{ teacher.subjects }}" required>
                </div>
                <div class="form-group">
                    <label for="qualification">Qualification</label>
                    <input type="text" id="qualification" name="qualification" value="{{ teacher.qualification }}" required>
                </div>
                <div class="form-group">
                    <label for="experience">Experience</label>
                    <input type="number" id="experience" name="experience" value="{{ teacher.experience }}" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address">{{ teacher.address }}</textarea>
                </div>
                <div class="form-group">
                    <label for="joining_date">Joining Date</label>
                    <input type="date" id="joining_date" name="joining_date" value="{{ teacher.joining_date }}" required>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
            {% else %}
            <p>Teacher not found.</p>
            {% endif %}
        </main>
    </div>
</body>
</html>
