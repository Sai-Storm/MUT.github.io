<!DOCTYPE html>
<html>
<head>
    <title>Edit Subject</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>School ERP System</h2>
        <div>
            <span>Admin | {{ session.fullname }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-danger" style="margin-left: 10px;">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="form-container">
            <h2>Edit Subject</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Subject Name:</label>
                    <input type="text" name="subject_name" value="{{ subject.subject_name }}" required>
                </div>
                <div class="form-group">
                    <label>Class:</label>
                    <input type="text" name="class_name" value="{{ subject.class_name }}" required>
                </div>
                <div class="form-group">
                    <label>Section:</label>
                    <input type="text" name="section" value="{{ subject.section }}" required>
                </div>
                <div class="form-group">
                    <label>Teacher:</label>
                    <select name="teacher_id">
                        <option value="">-- Select Teacher --</option>
                        {% for teacher in teachers %}
                            <option value="{{ teacher.teacher_id }}" {% if subject.teacher_id == teacher.teacher_id %}selected{% endif %}>
                                {{ teacher.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Update Subject</button>
                <a href="{{ url_for('admin_subjects') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
