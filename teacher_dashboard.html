<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Teacher Dashboard</h1>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
        </header>
        <nav>
            <a href="{{ url_for('teacher_mark_attendance') }}">Mark Attendance</a>
            <a href="{{ url_for('teacher_assignments') }}">Assignments</a>
            <a href="{{ url_for('teacher_enter_marks') }}">Enter Marks</a>
            <a href="{{ url_for('teacher_timetable') }}">Timetable</a>
            <!-- Add more links -->
        </nav>
        <main>
            {% if teacher %}
            <h2>Welcome, {{ teacher.name }}</h2>
            <p>Department: {{ teacher.department }}</p>
            <p>Subjects: {{ teacher.subjects }}</p>
            {% else %}
            <p>Teacher profile not found.</p>
            {% endif %}
        </main>
    </div>
</body>
</html>
