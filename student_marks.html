<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Marks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>My Marks</h1>
            <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">Back</a>
        </header>
        <main>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Exam Type</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for mark in marks %}
                    <tr>
                        <td>{{ mark.subject_name }}</td>
                        <td>{{ mark.marks }}</td>
                        <td>{{ mark.exam_type }}</td>
                        <td>{{ mark.date_entered }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </main>
    </div>
</body>
</html>
