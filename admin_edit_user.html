<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>School ERP System</h2>
        <div>
            <span>Admin | {{ session.fullname }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-danger" style="margin-left: 10px;">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="form-container">
            <h2>Edit User</h2>
            <form method="POST">
                <div class="form-group">
                    <label>User ID:</label>
                    <input type="text" value="{{ user.user_id }}" disabled>
                </div>
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" value="{{ user.username }}" disabled>
                </div>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" name="fullname" value="{{ user.fullname }}" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" name="phone" value="{{ user.phone }}" required>
                </div>
                <div class="form-group">
                    <label>Role:</label>
                    <select name="role" required>
                        <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
                        <option value="Teacher" {% if user.role == 'Teacher' %}selected{% endif %}>Teacher</option>
                        <option value="Student" {% if user.role == 'Student' %}selected{% endif %}>Student</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status:</label>
                    <input type="text" value="{{ user.status }}" disabled>
                </div>
                <button type="submit" class="btn btn-success">Update User</button>
                <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
